		FE439133A26945B5B2FB0E5B /* Install Python */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputPaths = (
				"$(PROJECT_DIR)/Frameworks/Python.xcframework/build/utils.sh",
				"$(PROJECT_DIR)/Frameworks/Python.xcframework/build/iOS-dylib-Info-template.plist",
				"$(PROJECT_DIR)/Frameworks/Python.xcframework/lib",
				"$(PROJECT_DIR)/app_packages",
			);
			name = "Install Python";
			outputPaths = (
				"$(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Frameworks",
				"$(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/python",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\nif [ \"$EFFECTIVE_PLATFORM_NAME\" = \"-iphonesimulator\" ]; then\n  HOST_ARCH=$(uname -m)\n  if [ \"$HOST_ARCH\" = \"x86_64\" ]; then\n    export ARCHS=\"x86_64\"\n  else\n    export ARCHS=\"arm64\"\n  fi\nfi\nsource \"$PROJECT_DIR/Frameworks/Python.xcframework/build/utils.sh\"\ninstall_python Frameworks/Python.xcframework app_packages\n\n# Bundle ffmpeg dylibs for PyAV\nFFMPEG_SRC=\"$PROJECT_DIR/Frameworks/ffmpeg\"\nFFMPEG_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"\nif [ -d \"$FFMPEG_SRC\" ]; then\n  echo \"Bundling ffmpeg dylibs...\"\n  for dylib in \"$FFMPEG_SRC\"/*.dylib; do\n    [ -L \"$dylib\" ] && continue\n    name=$(basename \"$dylib\")\n    short=$(echo \"$name\" | sed 's/\\([0-9]*\\)\\.[0-9]*\\.[0-9]*\\.dylib/\\1.dylib/')\n    cp \"$dylib\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n    if [ -f \"$FFMPEG_DST/$short\" ]; then\n      install_name_tool -id \"@rpath/$short\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n      for dep in $(otool -L \"$FFMPEG_DST/$short\" 2>/dev/null | grep '/tmp/ffmpeg-ios' | awk '{print $1}'); do\n        dep_short=$(basename \"$dep\" | sed 's/\\([0-9]*\\)\\.[0-9]*\\.[0-9]*\\.dylib/\\1.dylib/')\n        install_name_tool -change \"$dep\" \"@rpath/$dep_short\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n      done\n      codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n      echo \"  Bundled: $short\"\n    fi\n  done\nfi\n\n# Bundle LaTeX frameworks (pdftex, kpathsea, ios_system)\nLATEX_SRC=\"$PROJECT_DIR/Frameworks/latex\"\nLATEX_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"\nif [ -d \"$LATEX_SRC\" ]; then\n  echo \"Bundling LaTeX frameworks...\"\n  for xcfw in pdftex kpathsea ios_system; do\n    FW_DIR=\"$LATEX_SRC/$xcfw.xcframework\"\n    if [ -d \"$FW_DIR/ios-arm64/$xcfw.framework\" ]; then\n      SRC_FW=\"$FW_DIR/ios-arm64/$xcfw.framework\"\n    elif [ -d \"$FW_DIR/ios-arm64_armv7/$xcfw.framework\" ]; then\n      SRC_FW=\"$FW_DIR/ios-arm64_armv7/$xcfw.framework\"\n    else\n      continue\n    fi\n    rm -rf \"$LATEX_DST/$xcfw.framework\"\n    cp -R \"$SRC_FW\" \"$LATEX_DST/$xcfw.framework\"\n    codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$LATEX_DST/$xcfw.framework\" 2>/dev/null || true\n    echo \"  Bundled: $xcfw.framework\"\n  done\n  # Copy texmf support files\n  TEXMF_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks/latex/texmf\"\n  if [ -d \"$LATEX_SRC/texmf\" ]; then\n    mkdir -p \"$TEXMF_DST\"\n    cp -R \"$LATEX_SRC/texmf/\" \"$TEXMF_DST/\"\n    echo \"  Bundled: texmf ($(find $TEXMF_DST -type f | wc -l | tr -d ' ') files)\"\n  fi\nfi\n\n# Bundle KaTeX (JS + CSS + fonts) for LaTeX rendering in WKWebView\nKATEX_SRC=\"$PROJECT_DIR/Frameworks/katex\"\nKATEX_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks/katex\"\nif [ -d \"$KATEX_SRC\" ]; then\n  echo \"Bundling KaTeX...\"\n  mkdir -p \"$KATEX_DST/fonts\"\n  cp \"$KATEX_SRC/katex.min.js\" \"$KATEX_DST/\" 2>/dev/null || true\n  cp \"$KATEX_SRC/katex.min.css\" \"$KATEX_DST/\" 2>/dev/null || true\n  cp \"$KATEX_SRC/katex_template.html\" \"$KATEX_DST/\" 2>/dev/null || true\n  cp \"$KATEX_SRC\"/fonts/* \"$KATEX_DST/fonts/\" 2>/dev/null || true\n  echo \"  Bundled: KaTeX\"\nfi\n\n# Bundle Fortran runtime stubs for scipy (arpack/propack need _Fortran* symbols)\nFORTRAN_STUB_SRC=\"$PROJECT_DIR/Frameworks/fortran_stubs/libfortran_io_stubs.dylib\"\nFORTRAN_STUB_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks/libfortran_io_stubs.dylib\"\nif [ -f \"$FORTRAN_STUB_SRC\" ]; then\n  cp \"$FORTRAN_STUB_SRC\" \"$FORTRAN_STUB_DST\"\n  install_name_tool -id \"@rpath/libfortran_io_stubs.dylib\" \"$FORTRAN_STUB_DST\" 2>/dev/null || true\n  codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$FORTRAN_STUB_DST\" 2>/dev/null || true\n  echo \"  Bundled: libfortran_io_stubs.dylib\"\nfi\n\n# Rewrite av.*.framework LC_LOAD_DYLIB entries that hard-code /tmp/ffmpeg-ios\n# build paths → @rpath (ffmpeg dylibs are bundled above in Frameworks/).\nfor fw in \"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"/site-packages.av.*.framework; do\n  [ -d \"$fw\" ] || continue\n  bin=\"$fw/$(basename $fw .framework)\"\n  [ -f \"$bin\" ] || continue\n  for dep in $(otool -L \"$bin\" 2>/dev/null | awk '{print $1}' | grep \"/tmp/ffmpeg-ios\"); do\n    name=$(basename \"$dep\")\n    install_name_tool -change \"$dep\" \"@rpath/$name\" \"$bin\" 2>/dev/null || true\n  done\n  codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$fw\" 2>/dev/null || true\ndone\necho \"  Rewired av.*.framework → @rpath ffmpeg\"\n\n# Bundle scipy aux dylibs (scipy.special's _ufuncs.so / _gufuncs.so / etc.\n# load libsf_error_state.dylib via @rpath — dyld searches .app/Frameworks/).\nSCIPY_AUX_SRC=\"$PROJECT_DIR/Frameworks/scipy_aux\"\nif [ -d \"$SCIPY_AUX_SRC\" ]; then\n  for dylib in \"$SCIPY_AUX_SRC\"/*.dylib; do\n    [ -f \"$dylib\" ] || continue\n    name=$(basename \"$dylib\")\n    cp \"$dylib\" \"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks/$name\"\n    install_name_tool -id \"@rpath/$name\" \"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks/$name\" 2>/dev/null || true\n    codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks/$name\" 2>/dev/null || true\n    echo \"  Bundled scipy aux: $name\"\n  done\nfi\n\n# Bundle torch dylibs (libtorch_python + libshm) for native `import torch`\nTORCH_LIB_SRC=\"$PROJECT_DIR/app_packages/site-packages/torch/lib\"\nTORCH_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"\nif [ -d \"$TORCH_LIB_SRC\" ]; then\n  echo \"Bundling torch dylibs...\"\n  for dylib in libtorch_python.dylib libshm.dylib; do\n    if [ -f \"$TORCH_LIB_SRC/$dylib\" ]; then\n      cp \"$TORCH_LIB_SRC/$dylib\" \"$TORCH_DST/$dylib\"\n      install_name_tool -id \"@rpath/$dylib\" \"$TORCH_DST/$dylib\" 2>/dev/null || true\n      for dep in $(otool -L \"$TORCH_DST/$dylib\" 2>/dev/null | grep -oE '@loader_path/[^ ]+'); do\n        depname=$(basename \"$dep\")\n        install_name_tool -change \"$dep\" \"@rpath/$depname\" \"$TORCH_DST/$dylib\" 2>/dev/null || true\n      done\n      codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$TORCH_DST/$dylib\" 2>/dev/null || true\n      echo \"  Bundled: $dylib\"\n    fi\n  done\n  # install_python has already converted _C.cpython-*.so into a proper\n  # iOS .framework bundle at Frameworks/site-packages.torch._C.framework/.\n  # That framework's binary still references @loader_path/lib/libtorch_python.dylib,\n  # which won't resolve (the framework's @loader_path is its own dir, no lib/\n  # subdir). Rewrite to @rpath so dyld finds our sibling framework dylibs.\n  for fw in \"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"/site-packages.torch._C.framework \\\n            \"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"/site-packages.torch._C_flatbuffer.framework; do\n    [ -d \"$fw\" ] || continue\n    bin=\"$fw/$(basename $fw .framework)\"\n    [ -f \"$bin\" ] || continue\n    for dep in $(otool -L \"$bin\" 2>/dev/null | grep -oE '@loader_path/lib/[^ ]+'); do\n      depname=$(basename \"$dep\")\n      install_name_tool -change \"$dep\" \"@rpath/$depname\" \"$bin\" 2>/dev/null || true\n    done\n    codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$fw\" 2>/dev/null || true\n    echo \"  Rewired: $(basename $fw)\"\n  done\nfi\n";
		};
